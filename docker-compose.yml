services:

  # ── Auth Service DB ─────────────────────────────────────────────────────────
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-postgres}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - agentic

  # ── Auth Service ─────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ../AuthService
    depends_on:
      postgres-auth:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${AUTH_DB_PASSWORD:-postgres}@postgres-auth:5432/auth_service
      RSA_KEY_ID: ${RSA_KEY_ID:-key-2024-01}
      RSA_KEY_DIR: /keys
      TOKEN_EXPIRE_MINUTES: ${TOKEN_EXPIRE_MINUTES:-60}
    volumes:
      - rsa_keys:/keys
    ports:
      - "9000:9000"
    networks:
      - agentic

  # ── Gateway DB ───────────────────────────────────────────────────────────────
  postgres-gateway:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${GATEWAY_DB_PASSWORD:-postgres}
    volumes:
      - postgres_gateway_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_gateway"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - agentic

  # ── Agentic Gateway ───────────────────────────────────────────────────────────
  agent-gateway:
    build:
      context: ../                        # AgenticFrmk root — includes AgentCore + AgentGateway
      dockerfile: AgentGateway/Dockerfile # AgentCore installed from local source; no token needed
    depends_on:
      postgres-gateway:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${GATEWAY_DB_PASSWORD:-postgres}@postgres-gateway:5432/agent_gateway
      JWKS_URL: http://auth-service:9000/.well-known/jwks.json
      AUTH_SERVICE_TOKEN_URL: http://auth-service:9000/auth/token
    ports:
      - "8000:8000"
    networks:
      - agentic

  # ── SREDemo Web UI ───────────────────────────────────────────────────────────
  sre-demo:
    build:
      context: ../                     # AgenticFrmk root — includes AgentCore + SREDemo
      dockerfile: SREDemo/Dockerfile   # AgentCore installed from local source; no token needed
    depends_on:
      - auth-service
      - agent-gateway
    environment:
      AUTH_SERVICE_URL: http://auth-service:9000
      AGENT_API_URL: http://agent-gateway:8000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      USE_SYNTHETIC_DATA: ${USE_SYNTHETIC_DATA:-true}
      USE_MOCK_LLM: ${USE_MOCK_LLM:-false}
      SERVER_PORT: 3000
      DEMO_CONTEXT_LIMIT: ${DEMO_CONTEXT_LIMIT:-15000}
      DEMO_COMPACT_THRESHOLD: ${DEMO_COMPACT_THRESHOLD:-0.80}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      DD_API_KEY: ${DD_API_KEY:-}
      DD_APP_KEY: ${DD_APP_KEY:-}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      PD_API_KEY: ${PD_API_KEY:-}
      PD_ROUTING_KEY: ${PD_ROUTING_KEY:-}
      PD_FROM_EMAIL: ${PD_FROM_EMAIL:-}
      PD_SERVICE_ID: ${PD_SERVICE_ID:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - agentic

networks:
  agentic:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_gateway_data:
  rsa_keys:

secrets:
  github_token:
    environment: GITHUB_TOKEN
